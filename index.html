<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game — Developed by VISHANTH V</title>
    <meta name="description" content="A premium Snake Game experience developed by VISHANTH V.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">

        <!-- LEFT: Game Panel -->
        <div class="game-panel">
            <header>
                <div class="title-section">
                    <!-- SNAKE is now cyan, GAME is white -->
                    <h1><span>SNAKE</span> GAME</h1>
                    <p class="dev-credit">Developed by <strong>VISHANTH V</strong></p>
                </div>
                <div class="header-right">
                    <div id="player-badge" class="player-badge" style="display:none;">
                        <span class="label">PLAYER</span>
                        <span id="current-player-name">—</span>
                    </div>
                    <div id="score-container" class="score-badge">
                        <span class="label">SCORE</span>
                        <span id="score-value">000</span>
                    </div>
                </div>
            </header>

            <main>
                <canvas id="gameCanvas"></canvas>

                <!-- Name Entry Modal (shown before game starts) -->
                <div id="name-modal" class="overlay active">
                    <div class="overlay-content name-modal-content">
                        <div class="name-modal-icon">🐍</div>
                        <h2 id="overlay-title">SNAKE GAME</h2>
                        <p id="overlay-msg">Who's playing?</p>

                        <div class="name-input-group">
                            <input
                                type="text"
                                id="player-name-input"
                                class="name-input"
                                placeholder="Enter your name..."
                                maxlength="20"
                                autocomplete="off"
                            />
                        </div>

                        <!-- Existing players dropdown -->
                        <div id="existing-players-wrap" class="existing-players-wrap" style="display:none;">
                            <p class="existing-label">— or pick a returning player —</p>
                            <div id="existing-players" class="existing-players-list"></div>
                        </div>

                        <button id="start-btn">START GAME</button>
                    </div>
                </div>

                <!-- Game Over / Pause overlay (hidden initially) -->
                <div id="overlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="gameover-title">GAME OVER</h2>
                        <p id="gameover-msg"></p>
                        <button id="try-again-btn">TRY AGAIN</button>
                    </div>
                </div>
            </main>

            <footer>
                <div class="controls-hint">
                    <div class="hint">
                        <span class="key">↑</span>
                        <span class="key">←</span>
                        <span class="key">↓</span>
                        <span class="key">→</span>
                        <span>Keyboard</span>
                    </div>
                    <div class="divider"></div>
                    <div class="hint">
                        <span class="mouse-icon">🖱️</span>
                        <span>Click Direction</span>
                    </div>
                </div>
            </footer>
        </div>

        <!-- RIGHT: Leaderboard Panel -->
        <aside class="leaderboard-panel">
            <div class="lb-header">
                <div class="trophy-icon">🏆</div>
                <h2>LEADERBOARD</h2>
                <p class="lb-sub">Top 10 High Scores</p>
            </div>

            <ol class="lb-list" id="lb-list">
                <!-- Populated by JS -->
            </ol>

            <div class="lb-footer">
                <button id="clear-lb-btn">Clear All Scores</button>
            </div>
        </aside>

    </div>
    <script src="script.js"></script>
</body>
</html>
